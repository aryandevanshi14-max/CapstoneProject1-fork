<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About us</a>
        </nav>
        <div class="hero">Welcome to Rajasthan</div>
    </header>

    <h1>Choose your destination and click on guide button</h1>

    <div style="text-align:center; margin: 20px;">
        <input id="searchInput" type="text" placeholder="🔍 Search monuments..." style="
      padding: 10px 20px;
      width: 60%;
      border-radius: 25px;
      border: 2px solid #ccc;
      font-size: 16px;
      outline: none;
    " />
    </div>
    <div style="text-align:center; margin-bottom: 20px;">
        <button id="darkModeBtn" style="
    padding: 8px 20px;
    border-radius: 20px;
    border: none;
    background: #333;
    color: white;
    font-size: 14px;
    cursor: pointer;
  ">🌙 Dark Mode</button>
    </div>
    <div style="text-align:center; margin-bottom: 20px;">
        <button id="aiPlanBtn" onclick="showAIModal()" style="
    padding: 10px 25px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
  ">🤖 AI Guide Plan</button>
    </div>

    <!-- AI Modal -->
    <div id="aiModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999;">
        <div style="background:white; margin:5% auto; padding:30px; width:60%; border-radius:15px; max-height:80vh; overflow-y:auto;">
            <h2>🤖 AI Guide Plan</h2>
            <input id="aiMonumentInput" type="text" placeholder="Monument ka naam likho (e.g. Amber Fort)" style="width:100%; padding:10px; font-size:16px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;" />
            <button onclick="getAIPlan()" style="padding:10px 20px; background:#764ba2; color:white; border:none; border-radius:8px; cursor:pointer; font-size:15px;">Plan Banao ✨</button>
            <button onclick="closeAIModal()" style="padding:10px 20px; background:#ccc; border:none; border-radius:8px; cursor:pointer; margin-left:10px;">Close</button>
            <div id="aiResult" style="margin-top:20px; white-space:pre-wrap; font-size:15px; line-height:1.6;"></div>
        </div>
        <main id="cardDisplay">
        </main>

        <footer>
            <a href="/contactUs">Contact us</a>
        </footer>

        <a href="/password/0" class="plus"><img src="plus.svg" alt=""></a>
        <script src="/index.js"></script>
</body>

</html>
